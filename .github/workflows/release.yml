name: release

# Build a single-file dbmigrt binary per OS and attach to a GitHub Release.
# Triggered by pushing a version tag (e.g. v0.1.0). workflow_dispatch builds
# the binaries without releasing, so the matrix can be tested off a branch.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write   # create the release and upload assets

jobs:
  # Portable Linux binary: built with a uv-managed standalone CPython
  # (python-build-standalone), which is compiled against glibc 2.17 AND ships a
  # shared libpython. PyInstaller bundles that libpython, so the binary needs
  # only glibc 2.17 and runs on old servers (Ubuntu 18.04 = glibc 2.27, etc.) —
  # while the build still runs on a normal modern runner. (manylinux's own
  # interpreters are static, which PyInstaller can't use.)
  build-linux:
    name: build (linux/portable)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - name: Build with glibc-2.17 standalone Python
        run: |
          uv python install 3.11
          uv venv --python 3.11 .venv
          source .venv/bin/activate
          uv pip install . pyinstaller
          pyinstaller --onefile --name dbmigrt \
            --collect-submodules sqlalchemy.dialects \
            --hidden-import pymysql app/__main__.py
          ./dist/dbmigrt --version
          mv dist/dbmigrt dbmigrt-linux-x86_64
      - uses: actions/upload-artifact@v4
        with:
          name: dbmigrt-linux-x86_64
          path: dbmigrt-linux-x86_64

  # macOS/Windows build on their own runners (can't cross-build). These keep the
  # mssql extra so `push --url` (pyodbc) works; the Linux binary is export-focused.
  build-desktop:
    name: build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            asset: dbmigrt-macos-arm64
            bin: dbmigrt
          - os: windows-latest
            asset: dbmigrt-windows-x86_64.exe
            bin: dbmigrt.exe
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install unixODBC (macOS)
        if: runner.os == 'macOS'
        run: brew install unixodbc
      - name: Install dbmigrt + build tools
        run: |
          python -m pip install --upgrade pip
          pip install ".[mssql]" pyinstaller
      - name: Build binary
        run: >
          pyinstaller --onefile --name dbmigrt
          --collect-submodules sqlalchemy.dialects
          --hidden-import pymysql
          --hidden-import pyodbc
          app/__main__.py
      - name: Smoke test
        shell: bash
        run: ./dist/${{ matrix.bin }} --version
      - name: Stage asset
        shell: bash
        run: mv "dist/${{ matrix.bin }}" "${{ matrix.asset }}"
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: ${{ matrix.asset }}

  release:
    needs: [build-linux, build-desktop]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
