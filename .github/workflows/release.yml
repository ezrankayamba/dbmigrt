name: release

# Build a single-file dbmigrt binary per OS and attach to a GitHub Release.
# Triggered by pushing a version tag (e.g. v0.1.0). workflow_dispatch builds
# the binaries without releasing, so the matrix can be tested off a branch.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write   # create the release and upload assets

jobs:
  build:
    name: build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            asset: dbmigrt-linux-x86_64
            bin: dbmigrt
          - os: macos-latest
            asset: dbmigrt-macos-arm64
            bin: dbmigrt
          - os: windows-latest
            asset: dbmigrt-windows-x86_64.exe
            bin: dbmigrt.exe
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # pyodbc (for `push --url` direct mode) needs the unixODBC headers to
      # install on Linux/macOS; Windows ships ODBC and uses a self-contained wheel.
      - name: Install unixODBC (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y unixodbc-dev
      - name: Install unixODBC (macOS)
        if: runner.os == 'macOS'
        run: brew install unixodbc

      - name: Install dbmigrt + build tools
        run: |
          python -m pip install --upgrade pip
          pip install ".[mssql]" pyinstaller

      # SQLAlchemy loads driver dialects (pymysql, pyodbc) by name at connect
      # time, so PyInstaller can't see them statically — collect/declare them.
      - name: Build binary
        run: >
          pyinstaller --onefile --name dbmigrt
          --collect-submodules sqlalchemy.dialects
          --hidden-import pymysql
          --hidden-import pyodbc
          app/__main__.py

      - name: Smoke test
        shell: bash
        run: ./dist/${{ matrix.bin }} --version

      - name: Stage asset
        shell: bash
        run: mv "dist/${{ matrix.bin }}" "${{ matrix.asset }}"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: ${{ matrix.asset }}

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
